<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Fleet Debug Control</title>
        <style>
            body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; gap: 20px; padding: 20px; }
            .auth-panel { background: #252526; padding: 15px; border-radius: 5px; border: 1px solid #333; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
            .auth-panel input[type="text"] { flex-grow: 1; background: #1e1e1e; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 3px; font-family: monospace; }
            .auth-panel input[type="number"] { width: 80px; background: #1e1e1e; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 3px; font-family: monospace; text-align: center; }
            .main-content { display: flex; gap: 20px; flex-grow: 1; }
            .column { flex: 1; display: flex; flex-direction: column; gap: 10px; }
            
            /* Стили для мониторов */
            .monitor { background: #252526; padding: 15px; border-radius: 5px; border: 1px solid #333; white-space: pre-wrap; margin: 0; flex-grow: 1; min-height: 150px; }
            
            /* Стили для управления (правая часть) */
            textarea { background: #252526; color: #ce9178; border: 1px solid #333; padding: 10px; border-radius: 5px; resize: vertical; min-height: 200px; font-family: monospace; }
            button { background: #0e639c; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }
            button:hover { background: #1177bb; }
            button:disabled { background: #555; cursor: not-allowed; }
            .status { font-size: 0.8em; color: #888; }
        </style>
    </head>
    <body>
        <!-- Панель авторизации -->
        <div class="auth-panel">
            <strong>Access Token:</strong>
            <input type="text" id="tokenInput" placeholder="Вставьте ваш JWT токен сюда...">
            
            <strong>Fleet ID:</strong>
            <input type="number" id="fleetIdInput" value="1" min="1">

            <button id="connectBtn">Подключиться</button>
        </div>

        <div class="main-content">
            <!-- Левая колонка с мониторами состояния -->
            <div class="column">
                <strong id="fleetTitle">Live State (Fleet ID: 1):</strong>
                <pre id="display" class="monitor">Waiting for connection and token...</pre>

                <strong>User State:</strong>
                <pre id="userDisplay" class="monitor">Waiting for user data...</pre>
            </div>

            <!-- Правая колонка управления -->
            <div class="column">
                <strong>Send Command (JSON):</strong>
                <textarea id="cmdInput"></textarea>
                <button id="sendBtn" disabled>Отправить команду</button>
                <div id="log" class="status">Ожидание авторизации</div>
            </div>
        </div>

        <script>
            let ws = null;

            const tokenInput = document.getElementById('tokenInput');
            const fleetIdInput = document.getElementById('fleetIdInput');
            const connectBtn = document.getElementById('connectBtn');
            const fleetTitle = document.getElementById('fleetTitle');
            const display = document.getElementById('display');
            const userDisplay = document.getElementById('userDisplay');
            const cmdInput = document.getElementById('cmdInput');
            const sendBtn = document.getElementById('sendBtn');
            const log = document.getElementById('log');

            // Обновление только текстового заголовка на экране
            function updateFleetTitle() {
                const currentId = fleetIdInput.value.trim() || "1";
                fleetTitle.textContent = `Live State (Fleet ID: ${currentId}):`;
            }

            // Устанавливаем дефолтное значение JSON-шаблона ОДИН раз при загрузке страницы
            const initialId = fleetIdInput.value.trim() || "1";
            cmdInput.value = `{"action": "act_name", "params": {"fleet_id": ${initialId}}}`;
            updateFleetTitle();

            // Следим за изменением ID в инпуте (обновляем только заголовок)
            fleetIdInput.oninput = () => {
                updateFleetTitle();
            };

            // Функция инициализации сокета
            function connectWebSocket(token, fleetId) {
                if (ws) {
                    ws.close();
                }

                const wsUrl = `ws://localhost:4000/ws/${fleetId}?token=${encodeURIComponent(token)}`;
                ws = new WebSocket(wsUrl);

                // Прием данных
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        
                        // Проверяем верхний уровень
                        if (data.out_type === 'entity') {
                            // Маршрутизация по entity_type
                            if (data.entity_type === 'fleet') {
                                display.textContent = JSON.stringify(data, null, 2);
                            } else if (data.entity_type === 'user') {
                                userDisplay.textContent = JSON.stringify(data, null, 2);
                            }
                        }
                    } catch (e) {
                        console.error("Ошибка парсинга входящего сообщения", e);
                    }
                };

                ws.onopen = () => {
                    log.textContent = `Соединение установлено (Флотилия ${fleetId}) и авторизовано`;
                    log.style.color = "#888";
                    sendBtn.disabled = false;
                };

                ws.onclose = (event) => {
                    log.textContent = `Соединение закрыто (Код: ${event.code})`;
                    sendBtn.disabled = true;
                    if (event.code === 4001) {
                        log.textContent = "Ошибка: Неверный или просроченный токен";
                        log.style.color = "#f44336";
                    }
                };

                ws.onerror = (e) => {
                    log.textContent = "Ошибка WebSocket соединения";
                    log.style.color = "#f44336";
                    sendBtn.disabled = true;
                };
            }

            // Логика кнопки подключения
            connectBtn.onclick = () => {
                const token = tokenInput.value.trim();
                const fleetId = fleetIdInput.value.trim();

                if (!token) {
                    alert("Пожалуйста, введите токен!");
                    return;
                }
                if (!fleetId) {
                    alert("Пожалуйста, укажите ID флотилии!");
                    return;
                }

                log.textContent = `Установка соединения для флотилии ${fleetId}...`;
                connectWebSocket(token, fleetId);
            };

            // Отправка команды
            sendBtn.onclick = () => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    log.textContent = "Ошибка: Нет соединения с сервером";
                    return;
                }

                let rawValue = cmdInput.value;
                rawValue = rawValue.replace(/\/\/.*|\/\*[\s\S]*?\*\//g, "");
                try {
                    JSON.parse(rawValue); 
                    ws.send(rawValue);
                    log.textContent = `[${new Date().toLocaleTimeString()}] Отправлено!`;
                    log.style.color = "#888";
                } catch (e) {
                    log.textContent = `Ошибка: Невалидный JSON`;
                    log.style.color = "#f44336";
                }
            };
        </script>
    </body>
</html>
