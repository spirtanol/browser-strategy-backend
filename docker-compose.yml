x-backend-common: &backend_common
  build:
    context: .
    dockerfile: Dockerfile
  image: game:${APP_VERSION:-latest}
  env_file:
    - .env
  restart: unless-stopped

services:
  db:
    image: mariadb:10.4
    container_name: game-mariadb
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
    volumes:
      - mariadb-data:/var/lib/mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
      - MYSQL_ROOT_PASSWORD=321
      - TZ=UTC
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$$DB_USER -p$$DB_PASS"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: game-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5

  db-init:
    <<: *backend_common
    container_name: game-db-init
    restart: "no"
    command: >
      sh -c "alembic upgrade head && python -m app.seed"
    depends_on:
      db:
        condition: service_healthy

  core:
    <<: *backend_common
    container_name: game-core-${CONT_PREFIX:-prod}
    command: ["python", "-m", "app.main", "0.0.0.0", "8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully

  web:
    <<: *backend_common
    container_name: game-web-${CONT_PREFIX:-prod}
    command: ["python", "-m", "app.run_web", "0.0.0.0", "8000"]
    depends_on:
      core:
        condition: service_started
    ports:
      - "${HOST:-127.0.0.1}:${PORT:-8000}:8000"

volumes:
  mariadb-data:
  redisdata: